workflows:
  android-release-workflow:
    name: Android Release Workflow
    max_build_duration: 60
    environment:
      vars:
        EMAIL_RECIPIENT: "kssarras@gmail.com"
      android_signing:          # <-- CORREGIDO: sin 's' al final
        - videitos_keystore
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get   # <-- CORREGIDO: pub get
      - name: Build AAB with Flutter
        script: |
          flutter build appbundle --release   # <-- CORREGIDO: appbundle
    artifacts:
      - build/**/outputs/**/*.aab             # <-- CORREGIDO: .aab
    publishing:
      email:
        recipients:
          - kssarras@gmail.com
        notify:
          success: true
          failure: true